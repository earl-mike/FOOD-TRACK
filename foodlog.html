<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FoodLog</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #141210;
  --surface: #1c1916;
  --surface2: #232019;
  --surface3: #2a261f;
  --border: #2e2a22;
  --border2: #3a352a;
  --text: #ede8df;
  --text2: #b5ae9f;
  --muted: #6b6456;
  --muted2: #8a8070;
  --amber: #e8a93a;
  --amber-dim: #c48a25;
  --green: #7ec99a;
  --blue: #7ab3d4;
  --terra: #d4825a;
  --red: #d45a5a;
  --cal-bg: #2a2310;
  --pro-bg: #0f2318;
  --carb-bg: #0f1c28;
  --fat-bg: #281508;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
  padding-bottom: 100px;
}

/* ── HEADER ── */
.header {
  padding: 20px 20px 0;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
}
.header-left h1 {
  font-family: 'Fraunces', serif;
  font-size: 28px;
  font-weight: 300;
  color: var(--amber);
  letter-spacing: -0.02em;
  line-height: 1;
}
.header-left .tagline {
  font-size: 11px;
  color: var(--muted);
  margin-top: 3px;
  letter-spacing: 0.04em;
}
.sync-btn {
  background: none;
  border: 1px solid var(--border2);
  color: var(--muted2);
  border-radius: 8px;
  padding: 6px 10px;
  font-size: 11px;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 5px;
}
.sync-btn:hover { border-color: var(--amber); color: var(--amber); }
.sync-btn.syncing { color: var(--amber); border-color: var(--amber); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }
.sync-dot.ok { background: var(--green); }
.sync-dot.err { background: var(--red); }

/* ── DATE NAV ── */
.date-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px 0;
}
.date-arrow {
  background: none;
  border: none;
  color: var(--muted2);
  font-size: 20px;
  cursor: pointer;
  padding: 4px 10px;
  border-radius: 8px;
  transition: all 0.15s;
  line-height: 1;
}
.date-arrow:hover { color: var(--amber); background: var(--surface2); }
.date-arrow:disabled { color: var(--border2); cursor: default; background: none; }
.date-display {
  text-align: center;
  cursor: pointer;
}
.date-display .day-name {
  font-family: 'Fraunces', serif;
  font-size: 22px;
  font-weight: 300;
  color: var(--text);
  line-height: 1;
}
.date-display .date-str {
  font-size: 11px;
  color: var(--muted);
  margin-top: 2px;
  letter-spacing: 0.04em;
}
.date-display.today .day-name { color: var(--amber); }
input[type="date"]#datePicker {
  position: absolute;
  opacity: 0;
  pointer-events: none;
  width: 0;
  height: 0;
}

/* ── MACRO TOTALS ── */
.totals-wrap {
  padding: 16px 20px 0;
}
.totals-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.macro-card {
  border-radius: 12px;
  padding: 10px 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
  overflow: hidden;
}
.macro-card.cal { background: var(--cal-bg); border: 1px solid #4a3d10; }
.macro-card.pro { background: var(--pro-bg); border: 1px solid #0f3825; }
.macro-card.carb { background: var(--carb-bg); border: 1px solid #0f2e44; }
.macro-card.fat { background: var(--fat-bg); border: 1px solid #3d1f08; }
.macro-val {
  font-family: 'Fraunces', serif;
  font-size: 22px;
  font-weight: 400;
  line-height: 1;
}
.macro-card.cal .macro-val { color: var(--amber); }
.macro-card.pro .macro-val { color: var(--green); }
.macro-card.carb .macro-val { color: var(--blue); }
.macro-card.fat .macro-val { color: var(--terra); }
.macro-lbl {
  font-size: 9px;
  color: var(--muted2);
  margin-top: 3px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.macro-remain {
  font-size: 9px;
  color: var(--muted);
  margin-top: 2px;
}
.macro-remain.over { color: var(--red); }
.progress-bar {
  width: 100%;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  margin-top: 6px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.4s ease;
}
.macro-card.cal .progress-fill { background: var(--amber); }
.macro-card.pro .progress-fill { background: var(--green); }
.macro-card.carb .progress-fill { background: var(--blue); }
.macro-card.fat .progress-fill { background: var(--terra); }

/* ── ENTRY LIST ── */
.entries-section {
  padding: 20px 20px 0;
}
.entries-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.entries-title {
  font-family: 'Fraunces', serif;
  font-size: 15px;
  font-weight: 300;
  color: var(--text2);
  letter-spacing: 0.01em;
}
.copy-btn {
  background: none;
  border: 1px solid var(--border2);
  color: var(--muted2);
  border-radius: 8px;
  padding: 5px 10px;
  font-size: 11px;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
}
.copy-btn:hover { border-color: var(--amber); color: var(--amber); }
.copy-btn.copied { border-color: var(--green); color: var(--green); }

.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.7;
}
.empty-state .icon { font-size: 32px; margin-bottom: 10px; opacity: 0.4; }

.entry-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 10px;
  animation: slideIn 0.2s ease;
}
@keyframes slideIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

.entry-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 8px;
}
.entry-time {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.06em;
  margin-bottom: 4px;
  text-transform: uppercase;
}
.entry-desc {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.4;
  flex: 1;
}
.entry-photo {
  width: 52px;
  height: 52px;
  border-radius: 8px;
  object-fit: cover;
  border: 1px solid var(--border2);
  flex-shrink: 0;
}
.delete-btn {
  background: none;
  border: none;
  color: var(--border2);
  cursor: pointer;
  font-size: 18px;
  line-height: 1;
  padding: 0 2px;
  transition: color 0.15s;
  flex-shrink: 0;
}
.delete-btn:hover { color: var(--red); }

.entry-macros {
  display: flex;
  gap: 6px;
  margin-top: 10px;
  flex-wrap: wrap;
}
.entry-macro-pill {
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 6px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
}
.pill-cal { background: var(--cal-bg); color: var(--amber); border: 1px solid #4a3d1040; }
.pill-pro { background: var(--pro-bg); color: var(--green); border: 1px solid #0f382540; }
.pill-carb { background: var(--carb-bg); color: var(--blue); border: 1px solid #0f2e4440; }
.pill-fat { background: var(--fat-bg); color: var(--terra); border: 1px solid #3d1f0840; }

.entry-note {
  font-size: 10px;
  color: var(--muted);
  margin-top: 6px;
  font-style: italic;
}
.entry-items {
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid var(--border);
}
.entry-item-row {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--muted);
  padding: 1px 0;
}
.entry-item-row span:first-child { color: var(--muted2); }

/* ── ADD ENTRY ── */
.add-section {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 12px 16px 20px;
  z-index: 100;
}

.input-row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
}
.text-input-wrap {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 10px 12px;
  display: flex;
  align-items: flex-end;
  gap: 8px;
  transition: border-color 0.2s;
}
.text-input-wrap:focus-within { border-color: var(--amber-dim); }
.text-input-wrap textarea {
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  resize: none;
  flex: 1;
  max-height: 100px;
  line-height: 1.4;
  min-height: 22px;
}
.text-input-wrap textarea::placeholder { color: var(--muted); }

.photo-preview-wrap {
  position: relative;
  display: none;
}
.photo-preview-wrap.has-photo { display: block; }
.photo-preview {
  width: 42px;
  height: 42px;
  border-radius: 8px;
  object-fit: cover;
  border: 1px solid var(--border2);
}
.photo-clear {
  position: absolute;
  top: -5px;
  right: -5px;
  background: var(--red);
  color: white;
  border: none;
  border-radius: 50%;
  width: 16px;
  height: 16px;
  font-size: 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
}

.icon-btn {
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--muted2);
  border-radius: 12px;
  width: 44px;
  height: 44px;
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  flex-shrink: 0;
}
.icon-btn:hover { border-color: var(--amber); color: var(--amber); }

.submit-btn {
  background: var(--amber);
  border: none;
  color: var(--bg);
  border-radius: 12px;
  width: 44px;
  height: 44px;
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  flex-shrink: 0;
  font-weight: 600;
}
.submit-btn:hover { background: var(--amber-dim); }
.submit-btn:disabled { background: var(--border2); color: var(--muted); cursor: default; }
.submit-btn.loading { animation: pulse 0.8s infinite; }

/* ── LOADING OVERLAY ── */
.analyzing-toast {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 14px;
  padding: 16px 24px;
  font-size: 13px;
  color: var(--text2);
  display: none;
  z-index: 200;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}
.analyzing-toast.show { display: block; }
.analyzing-toast .spin { display: inline-block; animation: spin 1s linear infinite; margin-right: 8px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── CONFIG MODAL ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 300;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 18px;
  padding: 24px;
  width: 100%;
  max-width: 340px;
}
.modal h2 {
  font-family: 'Fraunces', serif;
  font-size: 20px;
  font-weight: 300;
  color: var(--amber);
  margin-bottom: 16px;
}
.modal label {
  display: block;
  font-size: 11px;
  color: var(--muted2);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  margin-bottom: 4px;
  margin-top: 12px;
}
.modal input[type="text"] {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 10px 12px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  outline: none;
}
.modal input:focus { border-color: var(--amber-dim); }
.modal-btns {
  display: flex;
  gap: 8px;
  margin-top: 20px;
}
.modal-btn {
  flex: 1;
  padding: 11px;
  border-radius: 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  border: none;
}
.modal-btn.primary { background: var(--amber); color: var(--bg); }
.modal-btn.primary:hover { background: var(--amber-dim); }
.modal-btn.secondary { background: var(--surface2); color: var(--text2); border: 1px solid var(--border2); }
.modal-btn.secondary:hover { border-color: var(--amber); color: var(--amber); }

/* ── FILE INPUT ── */
#photoInput, #cameraInput { display: none; }

/* ── SCROLLABLE MAIN ── */
.main { padding-bottom: 10px; }
</style>
</head>
<body>

<div class="main">
  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <h1>FoodLog</h1>
      <div class="tagline">track easy, eat smart</div>
    </div>
    <button class="sync-btn" onclick="openConfig()" title="Configure JSONBin">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncLabel">setup</span>
    </button>
  </div>

  <!-- DATE NAV -->
  <div class="date-nav">
    <button class="date-arrow" onclick="changeDate(-1)">‹</button>
    <div class="date-display" id="dateDisplay" onclick="document.getElementById('datePicker').showPicker()">
      <div class="day-name" id="dayName">—</div>
      <div class="date-str" id="dateStr">—</div>
    </div>
    <button class="date-arrow" id="nextBtn" onclick="changeDate(1)">›</button>
    <input type="date" id="datePicker" onchange="onDatePick(this.value)">
  </div>

  <!-- MACRO TOTALS -->
  <div class="totals-wrap">
    <div class="totals-grid">
      <div class="macro-card cal">
        <div class="macro-val" id="totalCal">0</div>
        <div class="macro-lbl">kcal</div>
        <div class="macro-remain" id="remainCal">2750 left</div>
        <div class="progress-bar"><div class="progress-fill" id="progCal" style="width:0%"></div></div>
      </div>
      <div class="macro-card pro">
        <div class="macro-val" id="totalPro">0</div>
        <div class="macro-lbl">protein</div>
        <div class="macro-remain" id="remainPro">220g left</div>
        <div class="progress-bar"><div class="progress-fill" id="progPro" style="width:0%"></div></div>
      </div>
      <div class="macro-card carb">
        <div class="macro-val" id="totalCarb">0</div>
        <div class="macro-lbl">carbs</div>
        <div class="macro-remain" id="remainCarb">265g left</div>
        <div class="progress-bar"><div class="progress-fill" id="progCarb" style="width:0%"></div></div>
      </div>
      <div class="macro-card fat">
        <div class="macro-val" id="totalFat">0</div>
        <div class="macro-lbl">fat</div>
        <div class="macro-remain" id="remainFat">70g left</div>
        <div class="progress-bar"><div class="progress-fill" id="progFat" style="width:0%"></div></div>
      </div>
    </div>
  </div>

  <!-- ENTRIES -->
  <div class="entries-section">
    <div class="entries-header">
      <div class="entries-title">Today's entries</div>
      <button class="copy-btn" id="copyBtn" onclick="copyForClaude()">Copy for Claude</button>
    </div>
    <div id="entriesList"></div>
  </div>
</div>

<!-- ADD ENTRY BAR -->
<div class="add-section">
  <div class="input-row">
    <div class="text-input-wrap">
      <div class="photo-preview-wrap" id="photoPreviewWrap">
        <img id="photoPreview" class="photo-preview" src="" alt="">
        <button class="photo-clear" onclick="clearPhoto()">×</button>
      </div>
      <textarea id="entryInput" placeholder="Describe what you ate…" rows="1" oninput="autoResize(this)" onkeydown="onEnterKey(event)"></textarea>
    </div>
    <!-- Camera -->
    <button class="icon-btn" onclick="document.getElementById('cameraInput').click()" title="Camera">📷</button>
    <!-- Gallery -->
    <button class="icon-btn" onclick="document.getElementById('photoInput').click()" title="Upload photo">🖼️</button>
    <!-- Submit -->
    <button class="submit-btn" id="submitBtn" onclick="submitEntry()" title="Add entry">↑</button>
  </div>
  <input type="file" id="photoInput" accept="image/*" onchange="handlePhoto(this)">
  <input type="file" id="cameraInput" accept="image/*" capture="environment" onchange="handlePhoto(this)">
</div>

<!-- ANALYZING TOAST -->
<div class="analyzing-toast" id="analyzingToast">
  <span class="spin">⏳</span> Estimating macros…
</div>

<!-- CONFIG MODAL -->
<div class="modal-overlay" id="configModal">
  <div class="modal">
    <h2>JSONBin Setup</h2>
    <label>Bin ID</label>
    <input type="text" id="cfgBinId" placeholder="e.g. 64abc123def456789">
    <label>Master Key</label>
    <input type="text" id="cfgMasterKey" placeholder="$2a$10$...">
    <div class="modal-btns">
      <button class="modal-btn secondary" onclick="closeConfig()">Cancel</button>
      <button class="modal-btn primary" onclick="saveConfig()">Save</button>
    </div>
  </div>
</div>

<script>
// ── TARGETS ──
const TARGETS = { cal: 2750, pro: 220, carb: 265, fat: 70 };

// ── STATE ──
let currentDate = todayStr();
let allData = {}; // { "YYYY-MM-DD": [ entries ] }
let pendingPhotoBase64 = null;
let pendingPhotoMime = null;

// ── DATE HELPERS ──
function todayStr() {
  const d = new Date();
  return d.toISOString().split('T')[0];
}
function formatDisplay(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return {
    day: days[d.getDay()],
    date: `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`
  };
}
function updateDateUI() {
  const { day, date } = formatDisplay(currentDate);
  document.getElementById('dayName').textContent = day;
  document.getElementById('dateStr').textContent = date;
  const el = document.getElementById('dateDisplay');
  el.classList.toggle('today', currentDate === todayStr());
  document.getElementById('nextBtn').disabled = currentDate >= todayStr();
  document.getElementById('datePicker').value = currentDate;
  const el2 = document.querySelector('.entries-title');
  el2.textContent = currentDate === todayStr() ? "Today's entries" : `Entries — ${date}`;
}
function changeDate(delta) {
  const d = new Date(currentDate + 'T12:00:00');
  d.setDate(d.getDate() + delta);
  const next = d.toISOString().split('T')[0];
  if (next <= todayStr()) {
    currentDate = next;
    updateDateUI();
    renderEntries();
    updateTotals();
  }
}
function onDatePick(val) {
  if (val <= todayStr()) {
    currentDate = val;
    updateDateUI();
    renderEntries();
    updateTotals();
  }
}

// ── ENTRIES ──
function getEntries() {
  return allData[currentDate] || [];
}
function setEntries(entries) {
  allData[currentDate] = entries;
}

function renderEntries() {
  const list = document.getElementById('entriesList');
  const entries = getEntries();
  if (entries.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="icon">🍽️</div>No entries yet.<br>Type what you ate or snap a photo.</div>`;
    return;
  }
  list.innerHTML = entries.map((e, i) => `
    <div class="entry-card">
      <div class="entry-top">
        <div style="flex:1">
          <div class="entry-time">${e.time}</div>
          <div class="entry-desc">${escHtml(e.description)}</div>
        </div>
        ${e.photo ? `<img class="entry-photo" src="${e.photo}" alt="food">` : ''}
        <button class="delete-btn" onclick="deleteEntry(${i})">×</button>
      </div>
      ${e.items && e.items.length > 1 ? `
        <div class="entry-items">
          ${e.items.map(it => `
            <div class="entry-item-row">
              <span>${escHtml(it.name)}</span>
              <span>${it.calories}cal · ${it.protein}p · ${it.carbs}c · ${it.fat}f</span>
            </div>
          `).join('')}
        </div>
      ` : ''}
      <div class="entry-macros">
        <span class="entry-macro-pill pill-cal">${Math.round(e.totals.calories)} kcal</span>
        <span class="entry-macro-pill pill-pro">${Math.round(e.totals.protein)}g P</span>
        <span class="entry-macro-pill pill-carb">${Math.round(e.totals.carbs)}g C</span>
        <span class="entry-macro-pill pill-fat">${Math.round(e.totals.fat)}g F</span>
      </div>
      ${e.note ? `<div class="entry-note">↳ ${escHtml(e.note)}</div>` : ''}
    </div>
  `).join('');
}

function updateTotals() {
  const entries = getEntries();
  const tot = entries.reduce((a, e) => ({
    cal: a.cal + (e.totals?.calories || 0),
    pro: a.pro + (e.totals?.protein || 0),
    carb: a.carb + (e.totals?.carbs || 0),
    fat: a.fat + (e.totals?.fat || 0),
  }), { cal: 0, pro: 0, carb: 0, fat: 0 });

  const pairs = [
    ['Cal', 'cal', 'Cal', 'kcal'],
    ['Pro', 'pro', 'Pro', 'g'],
    ['Carb', 'carb', 'Carb', 'g'],
    ['Fat', 'fat', 'Fat', 'g'],
  ];
  pairs.forEach(([id, key, label, unit]) => {
    const val = Math.round(tot[key]);
    const target = TARGETS[key];
    const remain = target - val;
    document.getElementById(`total${id}`).textContent = val;
    const remEl = document.getElementById(`remain${id}`);
    if (remain >= 0) {
      remEl.textContent = `${remain}${unit} left`;
      remEl.className = 'macro-remain';
    } else {
      remEl.textContent = `${Math.abs(remain)}${unit} over`;
      remEl.className = 'macro-remain over';
    }
    const pct = Math.min(100, (val / target) * 100);
    document.getElementById(`prog${id}`).style.width = pct + '%';
  });
}

function deleteEntry(i) {
  const entries = getEntries();
  entries.splice(i, 1);
  setEntries(entries);
  renderEntries();
  updateTotals();
  saveToCloud();
}

// ── ADD ENTRY ──
async function submitEntry() {
  const input = document.getElementById('entryInput');
  const text = input.value.trim();
  if (!text && !pendingPhotoBase64) return;

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.classList.add('loading');
  document.getElementById('analyzingToast').classList.add('show');

  try {
    const result = await estimateMacros(text || 'food shown in photo', pendingPhotoBase64, pendingPhotoMime);
    const now = new Date();
    const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    const entry = {
      id: Date.now(),
      time: timeStr,
      description: text || 'Photo entry',
      photo: pendingPhotoBase64 ? `data:${pendingPhotoMime};base64,${pendingPhotoBase64}` : null,
      items: result.items,
      totals: result.totals,
      note: result.note || null,
    };

    const entries = getEntries();
    entries.push(entry);
    setEntries(entries);
    renderEntries();
    updateTotals();
    saveToCloud();

    input.value = '';
    autoResize(input);
    clearPhoto();
  } catch (err) {
    alert('Could not estimate macros: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
    document.getElementById('analyzingToast').classList.remove('show');
  }
}

function onEnterKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    submitEntry();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

// ── PHOTO ──
function handlePhoto(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const dataUrl = e.target.result;
    const parts = dataUrl.split(',');
    const mime = parts[0].match(/:(.*?);/)[1];
    const b64 = parts[1];
    pendingPhotoBase64 = b64;
    pendingPhotoMime = mime;
    document.getElementById('photoPreview').src = dataUrl;
    document.getElementById('photoPreviewWrap').classList.add('has-photo');
  };
  reader.readAsDataURL(file);
  input.value = '';
}

function clearPhoto() {
  pendingPhotoBase64 = null;
  pendingPhotoMime = null;
  document.getElementById('photoPreview').src = '';
  document.getElementById('photoPreviewWrap').classList.remove('has-photo');
}

// ── AI ESTIMATION ──
async function estimateMacros(description, photoB64, photoMime) {
  const SYSTEM = `You are a nutrition estimator. The user describes food or shows a photo. Make a confident best-guess estimate of calories, protein, carbs, and fat. Never refuse. Use reasonable portion assumptions.

Respond ONLY with valid JSON, no markdown, no extra text:
{
  "items": [{ "name": "string", "calories": number, "protein": number, "carbs": number, "fat": number }],
  "totals": { "calories": number, "protein": number, "carbs": number, "fat": number },
  "note": "optional one-sentence assumption note or null"
}`;

  const userContent = [];
  if (photoB64) {
    userContent.push({ type: 'image', source: { type: 'base64', media_type: photoMime, data: photoB64 } });
  }
  userContent.push({ type: 'text', text: description || 'Estimate macros for what is shown.' });

  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: SYSTEM,
      messages: [{ role: 'user', content: userContent }]
    })
  });

  if (!resp.ok) throw new Error(`API error ${resp.status}`);
  const data = await resp.json();
  const text = data.content.map(c => c.text || '').join('').replace(/```json|```/g, '').trim();
  return JSON.parse(text);
}

// ── COPY FOR CLAUDE ──
function copyForClaude() {
  const entries = getEntries();
  const { day, date } = formatDisplay(currentDate);
  const tot = entries.reduce((a, e) => ({
    cal: a.cal + (e.totals?.calories || 0),
    pro: a.pro + (e.totals?.protein || 0),
    carb: a.carb + (e.totals?.carbs || 0),
    fat: a.fat + (e.totals?.fat || 0),
  }), { cal: 0, pro: 0, carb: 0, fat: 0 });

  let text = `📊 FoodLog — ${day}, ${date}\n`;
  text += `\nDAILY TOTAL: ${Math.round(tot.cal)} kcal | ${Math.round(tot.pro)}g P | ${Math.round(tot.carb)}g C | ${Math.round(tot.fat)}g F\n`;
  text += `TARGETS:     ${TARGETS.cal} kcal | ${TARGETS.pro}g P | ${TARGETS.carb}g C | ${TARGETS.fat}g F\n`;
  text += `REMAINING:   ${TARGETS.cal - Math.round(tot.cal)} kcal | ${TARGETS.pro - Math.round(tot.pro)}g P | ${TARGETS.carb - Math.round(tot.carb)}g C | ${TARGETS.fat - Math.round(tot.fat)}g F\n\n`;
  text += `ENTRIES:\n`;
  entries.forEach(e => {
    text += `\n[${e.time}] ${e.description}\n`;
    text += `  → ${Math.round(e.totals.calories)} kcal | ${Math.round(e.totals.protein)}g P | ${Math.round(e.totals.carbs)}g C | ${Math.round(e.totals.fat)}g F\n`;
    if (e.note) text += `  ↳ ${e.note}\n`;
  });

  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied! ✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy for Claude'; btn.classList.remove('copied'); }, 2000);
  });
}

// ── JSONBIN CLOUD SYNC ──
function getConfig() {
  return {
    binId: localStorage.getItem('foodlog_bin_id') || '',
    masterKey: localStorage.getItem('foodlog_master_key') || '',
  };
}

function updateSyncUI(state) {
  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncLabel');
  dot.className = 'sync-dot';
  if (state === 'ok') { dot.classList.add('ok'); lbl.textContent = 'synced'; }
  else if (state === 'err') { dot.classList.add('err'); lbl.textContent = 'error'; }
  else if (state === 'syncing') { lbl.textContent = 'syncing…'; }
  else { lbl.textContent = 'setup'; }
}

async function loadFromCloud() {
  const { binId, masterKey } = getConfig();
  if (!binId || !masterKey) { updateSyncUI('none'); renderEntries(); updateTotals(); return; }
  updateSyncUI('syncing');
  try {
    const resp = await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`, {
      headers: { 'X-Master-Key': masterKey }
    });
    if (!resp.ok) throw new Error();
    const data = await resp.json();
    allData = data.record || {};
    updateSyncUI('ok');
  } catch {
    updateSyncUI('err');
  }
  renderEntries();
  updateTotals();
}

async function saveToCloud() {
  const { binId, masterKey } = getConfig();
  if (!binId || !masterKey) return;
  updateSyncUI('syncing');
  try {
    const resp = await fetch(`https://api.jsonbin.io/v3/b/${binId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': masterKey },
      body: JSON.stringify(allData)
    });
    if (!resp.ok) throw new Error();
    updateSyncUI('ok');
  } catch {
    updateSyncUI('err');
  }
}

// ── CONFIG MODAL ──
function openConfig() {
  const { binId, masterKey } = getConfig();
  document.getElementById('cfgBinId').value = binId;
  document.getElementById('cfgMasterKey').value = masterKey;
  document.getElementById('configModal').classList.add('show');
}
function closeConfig() {
  document.getElementById('configModal').classList.remove('show');
}
function saveConfig() {
  localStorage.setItem('foodlog_bin_id', document.getElementById('cfgBinId').value.trim());
  localStorage.setItem('foodlog_master_key', document.getElementById('cfgMasterKey').value.trim());
  closeConfig();
  loadFromCloud();
}

// ── UTILS ──
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── INIT ──
updateDateUI();
loadFromCloud();
</script>
